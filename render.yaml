services:
  - type: web
    name: baruchgest-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://baruchgest.vercel.app
      - key: DATA_DIR
        value: /opt/render/project/data
    disk:
      name: baruchgest-data
      mountPath: /opt/render/project/data
      sizeGB: 1
